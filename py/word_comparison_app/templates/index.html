<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Word Compare - Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f1f5f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: rgba(30, 41, 59, 0.7); padding: 3rem; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); text-align: center; backdrop-filter: blur(10px); }
        h1 { margin-bottom: 2rem; font-weight: 800; background: linear-gradient(90deg, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        input[type="file"] { display: none; }
        .upload-btn { background: #6366f1; padding: 1rem 2rem; border-radius: 12px; cursor: pointer; display: inline-block; font-weight: 600; transition: transform 0.2s; }
        .upload-btn:hover { transform: scale(1.05); background: #4f46e5; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Word Comparison Tool</h1>
        <p>Upload XML, HTML, or TXT file to begin analysis.</p>
        <form action="/process" method="post" enctype="multipart/form-data">
            <label class="upload-btn">
                Select File
                <input type="file" name="content" onchange="this.form.submit()">
            </label>
        </form>
    </div>
</body>
</html>
