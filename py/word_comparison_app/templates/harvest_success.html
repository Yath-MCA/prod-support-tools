<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Success - Word Compare</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f1f5f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: rgba(30, 41, 59, 0.7); padding: 3rem; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .success-icon { font-size: 4rem; color: #10b981; margin-bottom: 1rem; }
        .btn { background: #6366f1; color: white; padding: 0.8rem 2rem; border-radius: 8px; text-decoration: none; font-weight: 600; display: inline-block; margin-top: 1.5rem; }
    </style>
</head>
<body>
    <div class="card">
        <div class="success-icon">✓</div>
        <h1>Words Saved!</h1>
        <p>Successfully added <strong>{{ count }}</strong> words to the <strong>{{ target }}</strong> dictionary.</p>
        <a href="/" class="btn">Process New File</a>
    </div>
</body>
</html>
