name: Playwright E2E Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      client:
        description: 'Client to test (lww | oup | medknow | plos | brill | all)'
        required: false
        default: 'lww'
      role:
        description: 'Role to test (author | editor | collator)'
        required: false
        default: 'author'
      status_sequence:
        description: 'Status sequence (active,signoff,deactive)'
        required: false
        default: 'active'
      suite:
        description: 'Test suite (landing | editor | all)'
        required: false
        default: 'landing'

jobs:
  # ---------------------------------------------------------------------------
  # Smoke — runs on every push, fast subset only
  # ---------------------------------------------------------------------------
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: playwright/package.json

      - name: Install dependencies
        working-directory: playwright
        run: npm ci

      - name: Install Playwright browsers
        working-directory: playwright
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        working-directory: playwright
        env:
          ENV:                  ci
          BASE_URL:             ${{ secrets.BASE_URL }}
          HEADLESS:             true
        run: npx playwright test --grep @smoke

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report-${{ github.run_number }}
          path: playwright/tests/reports/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Full landing page suite — manual trigger or main branch push
  # ---------------------------------------------------------------------------
  landing:
    name: Landing Workflow Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'

    strategy:
      fail-fast: false
      matrix:
        client: [ lww, oup, medknow ]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: playwright/package.json

      - name: Install dependencies
        working-directory: playwright
        run: npm ci

      - name: Install Playwright browsers
        working-directory: playwright
        run: npx playwright install --with-deps chromium

      - name: Run landing workflow tests
        working-directory: playwright
        env:
          ENV:                    ci
          BASE_URL:               ${{ secrets.BASE_URL }}
          TEST_CLIENT:            ${{ matrix.client }}
          TEST_ROLE:              ${{ github.event.inputs.role || 'author' }}
          TEST_STATUS_SEQUENCE:   ${{ github.event.inputs.status_sequence || 'active,signoff,deactive' }}
          HEADLESS:               true
          GITHUB_RUN_NUMBER:      ${{ github.run_number }}
          GOOGLE_SHEETS_ID:       ${{ secrets.GOOGLE_SHEETS_ID }}
          BROWSERSTACK_USERNAME:  ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
        run: npx playwright test tests/e2e/landing/

      - name: Upload landing report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: landing-report-${{ matrix.client }}-${{ github.run_number }}
          path: playwright/tests/reports/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Editor load suite
  # ---------------------------------------------------------------------------
  editor:
    name: Editor Load Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: playwright/package.json

      - name: Install dependencies
        working-directory: playwright
        run: npm ci

      - name: Install Playwright browsers
        working-directory: playwright
        run: npx playwright install --with-deps chromium

      - name: Run editor tests
        working-directory: playwright
        env:
          ENV:       ci
          BASE_URL:  ${{ secrets.BASE_URL }}
          HEADLESS:  true
        run: npx playwright test tests/e2e/editor-load.spec.js

      - name: Upload editor report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: editor-report-${{ github.run_number }}
          path: playwright/tests/reports/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # BrowserStack cross-browser — weekly or manual only
  # ---------------------------------------------------------------------------
  browserstack:
    name: BrowserStack Cross-Browser
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: playwright/package.json

      - name: Install dependencies
        working-directory: playwright
        run: npm ci

      - name: Run tests on BrowserStack
        working-directory: playwright
        env:
          ENV:                     ci
          BASE_URL:                ${{ secrets.BASE_URL }}
          BROWSERSTACK_USERNAME:   ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          GITHUB_RUN_NUMBER:       ${{ github.run_number }}
        run: npm run test:bs
